# Hermes Vault policy example
#
# v1 format is still supported:
#   services is a flat list, so the agent gets all actions on every listed
#   service. Omitted capabilities are implicitly granted for backward
#   compatibility.
#
# v2 format is preferred:
#   services is a map keyed by service name. Each service can set explicit
#   actions, a per-service TTL cap, and v0.19 lease requirements.
#
# Common actions:
#   get_credential, get_env, verify, metadata, rotate, delete,
#   issue_lease, list_leases, show_lease, renew_lease, revoke_lease
#
# Agent-level capabilities:
#   list_credentials, scan_secrets, export_backup, import_credentials

agents:
  # Legacy-compatible agent. Keep this narrow in real deployments.
  hermes:
    services: [openai, anthropic, minimax, github]
    raw_secret_access: false
    ephemeral_env_only: true
    require_verification_before_reauth: true
    max_ttl_seconds: 1800

  # v0.19 control-plane pattern: explainable access, lease checkout, and
  # metadata-only review before env materialization.
  dwight:
    services:
      openai:
        actions: [get_env, verify, metadata, issue_lease, list_leases, show_lease]
        max_ttl_seconds: 900
        require_lease_for_env: true
        require_lease_purpose: true
      github:
        actions: [get_env, verify, metadata]
        max_ttl_seconds: 600
    raw_secret_access: false
    ephemeral_env_only: true
    require_verification_before_reauth: true
    require_lease_for_env: true
    require_lease_purpose: true
    max_ttl_seconds: 900

  # Restricted capability agent.
  pam:
    services:
      google:
        actions: [get_env, verify, metadata]
        max_ttl_seconds: 600
    raw_secret_access: false
    ephemeral_env_only: true
    require_verification_before_reauth: true
    max_ttl_seconds: 900
    capabilities: [list_credentials, scan_secrets]

managed_paths:
  - "~/.hermes"
  - "~/.config/hermes"

plaintext_migration_paths: []
plaintext_exempt_paths: []
deny_plaintext_under_managed_paths: true
