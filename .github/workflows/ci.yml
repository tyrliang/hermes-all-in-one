name: ci

# PR / branch CI: build verification + runtime smoke. Publishing is tag-gated in release.yml.

# pull_request covers PR branches; push:main covers post-merge. Tags publish via release.yml.
on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Fast gate: catch unresolved conflict markers and unparseable vendored
  # Python in seconds, instead of as a 60s health-timeout in the smoke build.
  # The vendored webui ships in the image and crash-loops if it won't import.
  vendor-syntax:
    name: vendor syntax
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: No unresolved conflict markers in vendor/
        run: |
          if git grep -nE '^(<<<<<<<|>>>>>>>) ' -- vendor/; then
            echo "::error::unresolved git conflict markers in vendor/"
            exit 1
          fi

      - name: Byte-compile vendored webui
        run: python -m compileall -q vendor/hermes-webui

  smoke:
    name: smoke
    needs: [vendor-syntax]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Runtime smoke (build + health + admin + restart)
        run: ./scripts/smoke.sh
