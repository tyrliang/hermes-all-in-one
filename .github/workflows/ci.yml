name: ci

# PR / branch CI: build verification + runtime smoke. Publishing is tag-gated in release.yml.

on:
  pull_request:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  smoke:
    name: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Runtime smoke (build + health + admin + restart)
        shell: bash --noprofile --norc {0}
        run: ./scripts/smoke.sh
