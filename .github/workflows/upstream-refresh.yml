name: Upstream Refresh

# Single daily job that detects every upstream drift point and lands it in
# ONE PR with a single VERSION change:
#   - hermes-base  (Docker Hub tag, nousresearch/hermes-agent) + agent-base
#     (git tag, same upstream) always move together — they are the same
#     release, just consumed two ways (base image vs. vendored subtree).
#     Advancing either without the other leaves vendor/hermes-agent (used by
#     patch-vendor-models.py) out of sync with the image actually shipped.
#     A Hermes bump also advances the package semver (y+1, z=0).
#   - webui-base   (git tag, hermes-webui) is independent — vendored source
#     only, no base image. Advancing it does not bump package semver.
#
# Opens/updates a single automation branch + PR per day. Only pushes when
# something actually changed. The push and PR are authenticated as SYNC_PAT
# (a real user), not the default GITHUB_TOKEN — GitHub now gates *every*
# github-actions[bot]-authored PR run behind manual approval (2026-06-11
# changelog), so a bot-pushed branch never gets to run CI on its own.
# SYNC_PAT must be a PAT (repo scope) belonging to a human with write access.

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read pinned refs from VERSION
        id: version
        run: ./scripts/read-version.sh >> "$GITHUB_OUTPUT"

      - name: Add upstream remotes
        run: |
          git remote add hermes-agent-upstream https://github.com/NousResearch/hermes-agent.git || true
          git remote add hermes-webui-upstream https://github.com/nesquena/hermes-webui.git || true
          git fetch --tags hermes-agent-upstream
          git fetch --tags hermes-webui-upstream

      # hermes-base + agent-base: same upstream release, advanced together.
      # Gate on Docker Hub actually having published the image — a GitHub tag
      # can land before the image build finishes, and pinning the Dockerfile
      # to a tag with no image breaks every build until Hub catches up.
      - name: Detect Hermes Agent release (git tag ∩ Docker Hub image)
        id: hermes
        run: |
          set -euo pipefail
          pinned="${{ steps.version.outputs.hermes_base }}"

          git_latest="$(git ls-remote --tags hermes-agent-upstream \
            | sed 's#.*refs/tags/##' | grep -v '\^{}' | sort -V | tail -1)"
          hub_latest="$(./scripts/latest-hermes-tag.sh || true)"

          echo "pinned=${pinned:-<unset>} git-tag=${git_latest:-<none>} dockerhub-tag=${hub_latest:-<none>}"

          if [ -z "$git_latest" ] || [ -z "$hub_latest" ] || [ "$git_latest" != "$hub_latest" ]; then
            echo "Git tag and Docker Hub image disagree or are missing — skipping Hermes bump this run."
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest="$git_latest"
          if [ "$latest" = "$pinned" ] || \
             [ "$(printf '%s\n%s\n' "${pinned:-}" "$latest" | sort -V | tail -1)" != "$latest" ]; then
            echo "No newer Hermes release than the pin — skipping."
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"

      - name: Adopt new Hermes Agent release
        if: steps.hermes.outputs.needs_bump == 'true'
        run: |
          set -euo pipefail
          latest="${{ steps.hermes.outputs.latest }}"
          git fetch hermes-agent-upstream "$latest"
          git subtree pull --prefix=vendor/hermes-agent hermes-agent-upstream "$latest" --squash \
            -m "chore(sync): update vendor/hermes-agent to ${latest}"
          chmod +x scripts/bump-hermes.sh
          ./scripts/bump-hermes.sh "$latest"
          git add VERSION Dockerfile
          git commit -m "chore(release): adopt Hermes Agent ${latest}"

      # webui-base: independent vendor-only pin, no package version bump.
      - name: Detect hermes-webui release
        id: webui
        run: |
          set -euo pipefail
          pinned="${{ steps.version.outputs.webui_base }}"
          latest="$(git ls-remote --tags hermes-webui-upstream \
            | sed 's#.*refs/tags/##' | grep -v '\^{}' | sort -V | tail -1)"
          echo "pinned=${pinned:-<unset>} latest=${latest:-<none>}"

          if [ -z "$latest" ] || [ "$latest" = "$pinned" ] || \
             [ "$(printf '%s\n%s\n' "${pinned:-}" "$latest" | sort -V | tail -1)" != "$latest" ]; then
            echo "No newer webui tag than the pin — skipping."
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"

      - name: Adopt new hermes-webui release
        if: steps.webui.outputs.needs_bump == 'true'
        run: |
          set -euo pipefail
          latest="${{ steps.webui.outputs.latest }}"
          git fetch hermes-webui-upstream "$latest"
          git subtree pull --prefix=vendor/hermes-webui hermes-webui-upstream "$latest" --squash \
            -m "chore(sync): update vendor/hermes-webui to ${latest}"
          . scripts/version-lib.sh
          pin_webui_base "$latest"
          git add VERSION
          git commit -m "chore(sync): pin webui-base to ${latest}"

      - name: Patch vendor model lists
        if: steps.hermes.outputs.needs_bump == 'true' || steps.webui.outputs.needs_bump == 'true'
        run: |
          python3 scripts/patch-vendor-models.py
          if ! git diff --quiet vendor/hermes-webui/api/config.py; then
            git add vendor/hermes-webui/api/config.py
            git commit -m "chore(sync): patch webui model list from hermes-agent"
          fi

      - name: Guard — no conflict markers, vendored sources parse
        if: steps.hermes.outputs.needs_bump == 'true' || steps.webui.outputs.needs_bump == 'true'
        run: |
          if git grep -nE '^(<<<<<<<|>>>>>>>) ' -- vendor/; then
            echo "::error::unresolved conflict markers in vendor/ after sync"
            exit 1
          fi
          python -m compileall -q vendor/hermes-webui vendor/hermes-agent

      - name: Open / update refresh PR
        if: steps.hermes.outputs.needs_bump == 'true' || steps.webui.outputs.needs_bump == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
          HERMES_BUMPED: ${{ steps.hermes.outputs.needs_bump }}
          HERMES_LATEST: ${{ steps.hermes.outputs.latest }}
          WEBUI_BUMPED: ${{ steps.webui.outputs.needs_bump }}
          WEBUI_LATEST: ${{ steps.webui.outputs.latest }}
        run: |
          set -euo pipefail
          branch="automation/upstream-refresh"
          new_version="$(grep -Ev '^\s*(#|$)' VERSION | head -1 | tr -d ' \t\r\n')"

          body="Automated upstream refresh. **Review before merge** — gated by ci.yml (smoke + vendor-syntax); merging requires those checks to pass.
          "
          if [ "$HERMES_BUMPED" = "true" ]; then
            body="${body}
          - Adopts Hermes Agent **${HERMES_LATEST}** (\`hermes-base\` + \`agent-base\` + Dockerfile pin); package version → **${new_version}**"
          fi
          if [ "$WEBUI_BUMPED" = "true" ]; then
            body="${body}
          - Pins \`webui-base\` to **${WEBUI_LATEST}**"
          fi
          body="${body}

          Merging this PR does the whole release: tagging and the GHCR/GitHub Release publish happen automatically (see \`auto-tag-release.yml\` and \`release.yml\`). Nothing left to do by hand."

          git push -f origin "HEAD:${branch}"
          if [ "$(gh pr view "$branch" --json state -q .state 2>/dev/null || true)" = "OPEN" ]; then
            gh pr edit "$branch" --body "$body"
            echo "Refresh PR updated."
          else
            gh pr create --base main --head "$branch" \
              --title "chore(release): upstream refresh" \
              --body "$body"
          fi
