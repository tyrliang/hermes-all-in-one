name: release

# Publish multi-arch GHCR image on version tag (v0.x.z). Bump VERSION, merge, then: git tag vX.Y.Z && git push origin vX.Y.Z

on:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    name: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Verify release tag matches VERSION
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          expected="$(grep -Ev '^\s*(#|$)' VERSION | head -1 | tr -d ' \t\r\n' | sed 's/^v//')"
          if [[ "$tag" != "$expected" ]]; then
            echo "::error title=VERSION::tag ${GITHUB_REF_NAME} does not match VERSION (${expected})"
            exit 1
          fi

      - name: Runtime smoke (build + health + admin + restart)
        run: ./scripts/smoke.sh

  build-amd64:
    name: build (linux/amd64)
    needs: [smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v6

      - name: Read VERSION file
        id: version
        run: ./scripts/read-version.sh >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            HERMES_IMAGE=nousresearch/hermes-agent:${{ steps.version.outputs.hermes_base }}
            HERMES_WEBUI_VERSION=v${{ steps.version.outputs.semver }}
          platforms: linux/amd64
          outputs: type=image,push-by-digest=true,name-canonical=true
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-amd64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-amd64,mode=max

  build-arm64:
    name: build (linux/arm64)
    needs: [smoke]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v6

      - name: Read VERSION file
        id: version
        run: ./scripts/read-version.sh >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            HERMES_IMAGE=nousresearch/hermes-agent:${{ steps.version.outputs.hermes_base }}
            HERMES_WEBUI_VERSION=v${{ steps.version.outputs.semver }}
          platforms: linux/arm64
          outputs: type=image,push-by-digest=true,name-canonical=true
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-arm64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-arm64,mode=max

  merge:
    name: merge manifest
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Read VERSION file
        id: version
        run: ./scripts/read-version.sh >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          SEMVER: ${{ steps.version.outputs.semver }}
          HERMES_BASE: ${{ steps.version.outputs.hermes_base }}
          AMD64_DIGEST: ${{ needs.build-amd64.outputs.digest }}
          ARM64_DIGEST: ${{ needs.build-arm64.outputs.digest }}
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:v${SEMVER}" \
            "${IMAGE}@${AMD64_DIGEST}" \
            "${IMAGE}@${ARM64_DIGEST}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEMVER: ${{ steps.version.outputs.semver }}
          HERMES_BASE: ${{ steps.version.outputs.hermes_base }}
        run: |
          set -euo pipefail
          tag="v${SEMVER}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release ${tag} already exists; skipping create."
            exit 0
          fi
          gh release create "$tag" \
            --title "hermes-all-in-one ${tag}" \
            --notes "Built on Hermes Agent **${HERMES_BASE}**.

          Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${tag}\`"
