name: docker

# GHCR semver image tag is v$(cat VERSION) on each non-PR publish (main branch / workflow_dispatch).
# Also publishes latest, branch ref, sha. Bump VERSION + push main — see scripts/set-version.sh

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Cancel obsolete PR runs in flight; let main runs queue so we don't drop a publish.
concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-amd64:
    name: build (linux/amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v6

      - name: Read VERSION file
        id: version
        run: |
          set -euo pipefail
          test -f VERSION || { echo '::error title=VERSION::VERSION missing in repo root'; exit 1; }
          line=$(grep -Ev '^\s*(#|$)' VERSION | head -1 | tr -d ' \t\r\n')
          [ -n "$line" ] || { echo '::error title=VERSION::VERSION must contain semver (first non-comment line)'; exit 1; }
          line="${line#v}"
          case "$line" in
            *.*.*) ;;
            *) echo "::error title=VERSION::$line is not semver major.minor.patch" >&2; exit 1 ;;
          esac
          echo "semver=$line" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            HERMES_WEBUI_VERSION=v${{ steps.version.outputs.semver }}
          platforms: linux/amd64
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,push-by-digest=true,name-canonical=true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Registry-only cache: durable, no 10GB GHA cap, identical perf for native amd64/arm64 runners.
          # Skip cache-to on PRs since we don't have packages: write to push the buildcache tag.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-amd64
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/{1}:buildcache-amd64,mode=max', env.REGISTRY, env.IMAGE_NAME) || '' }}

  build-arm64:
    name: build (linux/arm64)
    # Skip arm64 on PRs — halves CI time; main still publishes multi-arch.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v6

      - name: Read VERSION file
        id: version
        run: |
          set -euo pipefail
          test -f VERSION || { echo '::error title=VERSION::VERSION missing in repo root'; exit 1; }
          line=$(grep -Ev '^\s*(#|$)' VERSION | head -1 | tr -d ' \t\r\n')
          [ -n "$line" ] || { echo '::error title=VERSION::VERSION must contain semver (first non-comment line)'; exit 1; }
          line="${line#v}"
          case "$line" in
            *.*.*) ;;
            *) echo "::error title=VERSION::$line is not semver major.minor.patch" >&2; exit 1 ;;
          esac
          echo "semver=$line" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            HERMES_WEBUI_VERSION=v${{ steps.version.outputs.semver }}
          platforms: linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,push-by-digest=true,name-canonical=true
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-arm64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-arm64,mode=max

  merge:
    name: merge manifest
    needs: [build-amd64, build-arm64]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Read VERSION file
        id: version
        run: |
          set -euo pipefail
          test -f VERSION || { echo '::error title=VERSION::VERSION missing in repo root'; exit 1; }
          line=$(grep -Ev '^\s*(#|$)' VERSION | head -1 | tr -d ' \t\r\n')
          [ -n "$line" ] || { echo '::error title=VERSION::VERSION must contain semver (first non-comment line)'; exit 1; }
          line="${line#v}"
          case "$line" in
            *.*.*) ;;
            *) echo "::error title=VERSION::$line is not semver major.minor.patch" >&2; exit 1 ;;
          esac
          echo "semver=$line" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v${{ steps.version.outputs.semver }}

      - name: Create and push multi-arch manifest
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          AMD64_DIGEST: ${{ needs.build-amd64.outputs.digest }}
          ARM64_DIGEST: ${{ needs.build-arm64.outputs.digest }}
        run: |
          set -euo pipefail
          tags="${{ steps.meta.outputs.tags }}"
          args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            args+=(-t "$tag")
          done <<< "$tags"
          docker buildx imagetools create "${args[@]}" \
            "${IMAGE}@${AMD64_DIGEST}" \
            "${IMAGE}@${ARM64_DIGEST}"
