# Tailscale SSH mode "openssh": sshd on loopback, exposed via `tailscale serve`.
# Client keys: /opt/data/.ssh/authorized_keys (hermes home is /opt/data).
# Host keys: persisted on the volume so Railway redeploys keep a stable fingerprint.
ListenAddress 127.0.0.1
Port 22
PasswordAuthentication no
KbdInteractiveAuthentication no
PermitRootLogin prohibit-password
AllowUsers hermes root
AuthorizedKeysFile /opt/data/.ssh/authorized_keys
HostKey /opt/data/.ssh/host/ssh_host_ed25519_key
HostKey /opt/data/.ssh/host/ssh_host_ecdsa_key
HostKey /opt/data/.ssh/host/ssh_host_rsa_key
